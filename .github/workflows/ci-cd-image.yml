kname: Build, Push and Deploy Image

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/calvinsaputra/nginx-calvinsaputra

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login GHCR
        run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Image
        run: docker build -t $IMAGE_NAME .

      - name: Push Image
        run: docker push $IMAGE_NAME

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Pull & Run
        run: |
          docker run -d -p 8080:80 --name test $IMAGE_NAME
          sleep 5
          curl localhost:8080
