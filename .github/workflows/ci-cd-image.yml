name: Build, Push and Deploy Image

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/calvinsaputra/nginx-calvinsaputra

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker Image
        run: docker build -t $IMAGE_NAME .

      - name: Push Docker Image
        run: docker push $IMAGE_NAME

  test:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Test container
        run: |
          docker run -d -p 8080:80 --name test-container $IMAGE_NAME
          sleep 5
          curl localhost:8080
